name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Project Setup
        run: |
          npm run setup
          npx playwright install --with-deps chromium
          npm run dev:daemon

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          prompt: |
            A Playwright MCP server is running and available to you. Use it to visually validate your output:
            - After making UI changes, take a screenshot with browser_take_screenshot to confirm the result looks correct.
            - If the task involves interactive behavior, use browser_click and browser_type to exercise it.
            - Use browser_console_messages to catch any runtime errors after rendering.
            - Do not skip visual validation — confirm the component works in the browser before finishing.

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          settings: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": ["@playwright/mcp@latest", "--headless"]
                }
              },
              "permissions": {
                "allow": [
                  "mcp__playwright__browser_navigate",
                  "mcp__playwright__browser_console_messages",
                  "mcp__playwright__browser_snapshot",
                  "mcp__playwright__browser_click",
                  "mcp__playwright__browser_take_screenshot",
                  "mcp__playwright__browser_type",
                  "mcp__playwright__browser_wait_for"
                ]
              }
            }

